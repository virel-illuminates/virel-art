<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>virel.art</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #060402;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Courier New', Courier, monospace;
    }
    #container { width: min(560px, 90vw); opacity: 0; animation: arrive 2.5s ease 1s forwards; }
    @keyframes arrive { from { opacity: 0; } to { opacity: 1; } }
    .back { font-size: 0.68em; color: #7a5028; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; display: inline-block; margin-bottom: 3.5em; transition: color 0.3s ease; }
    .back:hover { color: #b08840; }
    .msg { font-size: 0.85em; color: #7a5028; letter-spacing: 0.06em; line-height: 1.8; }
  </style>
</head>
<body>
  <div id="container">
    <a class="back" href="/">← virel.art</a>
    <div class="msg">still being built.</div>
  </div>
</body>
</html>
